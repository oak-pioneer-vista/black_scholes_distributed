# range_pricer server configuration
# All values can be overridden on the command line.

# Number of worker processes to fork
processes = 2

# Worker threads per process
threads = 4

# ZMQ frontend endpoint (clients connect here)
frontend = tcp://*:5555

# ZMQ backend endpoint (worker threads connect here)
backend = ipc:///tmp/range_pricer_backend

# Log file path (rotating, 10 MB x 5). Leave empty to disable file logging.
log_file = range_pricer.log

# Use UTC timestamps (true) or local time (false)
log_utc = true

# Include OS thread ID in every log line
log_tid = true

# Include processor/CPU ID in every log line
# Linux: sched_getcpu(); macOS: always -1 (no per-thread CPU pinning exposed)
log_cpu = true
